# Build backend Docker image and deploy to Cloud Run.
#
# Run locally (needs gcloud auth + Cloud Build API enabled):
#   gcloud config set project YOUR_PROJECT_ID
#   gcloud builds submit --config=cloudbuild.yaml .
#
# Auto-deploy on git push: Cloud Console → Cloud Build → Triggers → connect GitHub repo,
# branch ^main$, config = this file, included files filter optional (e.g. backend/**).
#
timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/recruix-backend:$BUILD_ID
      - -t
      - gcr.io/$PROJECT_ID/recruix-backend:latest
      - ./backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/recruix-backend:$BUILD_ID

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/recruix-backend:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - recruix-backend
      - --image=gcr.io/$PROJECT_ID/recruix-backend:$BUILD_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --quiet
